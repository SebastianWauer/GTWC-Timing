name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create or get KV namespace for session archive
        run: |
          ACCOUNT_ID="26ef6c9066ca3d71dfd4bed75c5450dd"
          NAMESPACES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/storage/kv/namespaces?per_page=100")
          KV_ID=$(echo "$NAMESPACES" | python3 -c "
          import json, sys
          ns = json.load(sys.stdin)
          for n in ns.get('result', []):
              if n['title'] == 'GTWC_SESSIONS':
                  print(n['id'])
                  break
          ")
          if [ -z "$KV_ID" ]; then
            echo "Creating new KV namespace GTWC_SESSIONS..."
            RESULT=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/storage/kv/namespaces" \
              -d '{"title": "GTWC_SESSIONS"}')
            KV_ID=$(echo "$RESULT" | python3 -c "import json, sys; print(json.load(sys.stdin)['result']['id'])")
          fi
          echo "Using KV namespace ID: $KV_ID"
          sed -i "s/GTWC_KV_ID/$KV_ID/" wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy

      - name: Set SRO_FTP_PASS secret
        run: echo "${{ secrets.SRO_FTP_PASS }}" | npx wrangler secret put SRO_FTP_PASS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Set INGEST_SECRET
        run: echo "${{ secrets.INGEST_SECRET }}" | npx wrangler secret put INGEST_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
