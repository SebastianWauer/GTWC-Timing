name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Cloudflare Account ID
        id: cf-account
        run: |
          ACCOUNT_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts?per_page=1" | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ steps.cf-account.outputs.account_id }}
          command: deploy

      - name: Set SRO_FTP_PASS secret
        run: echo "${{ secrets.SRO_FTP_PASS }}" | npx wrangler secret put SRO_FTP_PASS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-account.outputs.account_id }}

      - name: Set INGEST_SECRET
        run: echo "${{ secrets.INGEST_SECRET }}" | npx wrangler secret put INGEST_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-account.outputs.account_id }}
