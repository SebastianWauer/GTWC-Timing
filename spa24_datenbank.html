<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>24h Spa 2026 — Kommentator-Datenbank</title>
<style>
  :root{
    --bg:#0b0c0f; --bg2:#13151a; --card:#171a21; --card2:#1d2129;
    --input:#1f242d; --border:#272c36; --border2:#363d4a;
    --text:#eef1f6; --muted:#9aa3b2; --dim:#69707e;
    --red:#e2342b; --red-d:#9c1c16; --amber:#f0a23c; --amber2:#f0a23c;
    --gold:#d8a33a; --silver:#b9c0cc; --bronze:#c07c44; --plat:#7fd0e6;
    --pro:#e2342b; --proam:#c77dff; --goldc:#d8a33a; --silverc:#9aa3b2; --bronzec:#c07c44;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:16px;line-height:1.5;min-height:100%}
  body{display:flex;flex-direction:column;min-height:100dvh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}

  /* HEADER */
  header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0b0c0f 0%,#0b0c0f 70%,rgba(11,12,15,.92) 100%);border-bottom:1px solid var(--border)}
  .top{display:flex;align-items:center;gap:10px;padding:13px 15px 9px}
  .badge{display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 9px var(--red)}
  .ttl{font-size:14px;font-weight:700;letter-spacing:.04em}
  .ttl small{display:block;font-size:10px;font-weight:600;color:var(--dim);letter-spacing:.12em;margin-top:1px}
  .count{margin-left:auto;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}

  .searchwrap{padding:0 15px 10px}
  .search{width:100%;background:var(--input);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-size:15px;outline:none}
  .search:focus{border-color:var(--border2)}
  .search::placeholder{color:var(--dim)}

  /* category pills */
  .pills{display:flex;gap:7px;overflow-x:auto;padding:0 15px 9px;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:5px}
  .pill.on{background:var(--text);color:#0b0c0f;border-color:var(--text)}

  /* class chips */
  .chips{display:flex;gap:6px;overflow-x:auto;padding:0 15px 11px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:5px 11px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--muted);white-space:nowrap}
  .chip.on{color:#0b0c0f}
  .chip[data-c="ALLE"].on{background:var(--text);border-color:var(--text)}
  .chip[data-c="PRO"].on{background:var(--pro);border-color:var(--pro);color:#fff}
  .chip[data-c="PRO-AM"].on{background:var(--proam);border-color:var(--proam);color:#1a0b2e}
  .chip[data-c="GOLD"].on{background:var(--goldc);border-color:var(--goldc)}
  .chip[data-c="SILVER"].on{background:var(--silverc);border-color:var(--silverc)}
  .chip[data-c="BRONZE"].on{background:var(--bronzec);border-color:var(--bronzec);color:#fff}
  .actions{display:flex;gap:8px;padding:0 15px 12px}
  .actionbtn{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700}
  .actionbtn:active{border-color:var(--border2)}

  /* LIST */
  main{flex:1;padding:13px 15px 60px;max-width:760px;width:100%;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .12s}
  .card:active{border-color:var(--border2)}
  .crow{display:flex;align-items:flex-start;gap:11px}
  .num{flex:0 0 auto;min-width:42px;height:42px;padding:0 6px;border-radius:9px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;font-variant-numeric:tabular-nums}
  .cmain{flex:1;min-width:0}
  .cteam{font-weight:700;font-size:15px;line-height:1.3}
  .ccar{font-size:12.5px;color:var(--muted);margin-top:2px}
  .ctag{margin-left:auto;flex:0 0 auto}
  .clsbadge{font-size:10px;font-weight:800;letter-spacing:.04em;padding:3px 7px;border-radius:5px;color:#0b0c0f}
  .clsbadge.PRO{background:var(--pro);color:#fff}
  .clsbadge.PROAM{background:var(--proam);color:#1a0b2e}
  .clsbadge.GOLD{background:var(--goldc)}
  .clsbadge.SILVER{background:var(--silverc)}
  .clsbadge.BRONZE{background:var(--bronzec);color:#fff}
  .clsbadge.INFO{background:var(--border2);color:var(--text)}
  .drow{margin-top:9px;font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 10px}
  .drow b{color:var(--text);font-weight:600}
  .hooks{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px}
  .hook{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px;background:rgba(226,52,43,.12);color:#f08a84;border:1px solid rgba(226,52,43,.25)}
  .hook.custom{background:rgba(127,208,230,.14);color:#a7e8f5;border-color:rgba(127,208,230,.3)}
  .seclabel{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin:18px 2px 9px}
  .empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:14px}

  /* DETAIL */
  .detail{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column}
  .detail.on{display:flex}
  .dhead{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 15px;display:flex;align-items:center;gap:11px}
  .back{font-size:14px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:5px;padding:5px 4px}
  .dbody{flex:1;overflow-y:auto;padding:16px 17px 70px;max-width:760px;width:100%;margin:0 auto;-webkit-overflow-scrolling:touch}
  .dnum{display:inline-flex;align-items:center;gap:9px;margin-bottom:6px}
  .dnum .n{min-width:46px;height:46px;padding:0 8px;border-radius:10px;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px}
  .dtitle{font-size:21px;font-weight:800;line-height:1.25;margin:8px 0 4px}
  .dsub{font-size:14px;color:var(--muted);margin-bottom:14px}
  .dsec{margin:16px 0}
  .dsec h3{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);font-weight:800;margin-bottom:8px}
  .dsec p{font-size:14.5px;color:#dde1e9;margin-bottom:9px}
  .dsec p:last-child{margin-bottom:0}
  .dlist{list-style:none}
  .dlist li{font-size:14px;padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
  .dlist li:last-child{border-bottom:none}
  .dlist .k{flex:0 0 auto;min-width:84px;color:var(--muted);font-weight:600}
  .dlist .v{flex:1;color:#dde1e9}
  .drivers{display:flex;flex-direction:column;gap:7px;margin-top:4px}
  .driver{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
  .driver .di{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--card2);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-weight:700}
  .driver .dn{flex:1;font-size:14px;font-weight:600}
  .driver .dnote{font-size:11px;color:var(--muted)}
  .pin{font-size:12px;color:var(--dim);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:14px;line-height:1.5}
  table.mini{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  table.mini td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:top}
  table.mini td:first-child{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  table.mini tr:last-child td{border-bottom:none}
  .tllist{display:flex;flex-direction:column;gap:2px}
  .tlrow{display:flex;gap:10px;font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--border)}
  .tlrow:last-child{border-bottom:none}
  .tlrow .tt{flex:0 0 auto;min-width:96px;color:var(--red);font-weight:700;font-variant-numeric:tabular-nums}
  .tlrow.live .tt::after{content:" ●";color:var(--red)}
  .tlrow .te{flex:1;color:#dde1e9}
  .tlrow .te small{display:block;color:var(--dim);font-size:11px}
  .daycard{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:11px}
  .daycard h4{font-size:13px;font-weight:800;color:var(--amber2);margin-bottom:9px;letter-spacing:.02em}
  .foot{text-align:center;color:var(--dim);font-size:11px;padding:24px 0 8px}
  .customflag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--plat);margin-top:8px}
  .mutebtn{margin-top:14px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:#ffb4b4;font-size:13px;font-weight:700}

  /* FORM */
  .sheet{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.72);display:none;align-items:flex-end}
  .sheet.on{display:flex}
  .sheetcard{width:100%;max-width:760px;margin:0 auto;background:var(--bg2);border-top:1px solid var(--border2);border-radius:18px 18px 0 0;padding:16px 15px 24px;max-height:92dvh;overflow-y:auto}
  .sheethead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .sheettitle{font-size:18px;font-weight:800}
  .sheetclose{font-size:13px;font-weight:700;color:var(--muted);padding:6px 2px}
  .formgrid{display:grid;gap:11px}
  .field label{display:block;font-size:11px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:14px;outline:none}
  .field textarea{min-height:86px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--border2)}
  .sheethint{font-size:12px;color:var(--muted);line-height:1.45}
  .saverow{display:flex;gap:8px;margin-top:14px}
  .savebtn,.ghostbtn{flex:1;border-radius:10px;padding:11px 12px;font-size:14px;font-weight:800}
  .savebtn{background:var(--red);color:#fff}
  .ghostbtn{background:var(--card);border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="badge"><span class="dot"></span>
      <div class="ttl">24h SPA 2026<small>CROWDSTRIKE · GTWC ENDURANCE</small></div>
    </div>
    <div class="count" id="count"></div>
  </div>
  <div class="searchwrap"><input class="search" id="q" placeholder="Suche: Team, Fahrer, Marke, Nr. …" autocomplete="off"></div>
  <div class="pills" id="pills"></div>
  <div class="chips" id="chips"></div>
  <div class="actions" id="actions">
    <button class="actionbtn" id="add-entry-btn">+ Eigener Eintrag</button>
  </div>
</header>
<main id="list"></main>

<div class="detail" id="detail">
  <div class="dhead"><button class="back" id="back">‹ Zurück</button></div>
  <div class="dbody" id="dbody"></div>
</div>

<div class="sheet" id="entry-sheet">
  <div class="sheetcard">
    <div class="sheethead">
      <div class="sheettitle">Eigenen Eintrag erfassen</div>
      <button class="sheetclose" id="entry-close">Schließen</button>
    </div>
    <div class="sheethint">Die Einträge werden lokal in diesem Browser gespeichert und erscheinen direkt in der Team-Datenbank.</div>
    <div class="formgrid" style="margin-top:14px">
      <div class="field"><label for="entry-number">Startnummer</label><input id="entry-number" maxlength="6" placeholder="z. B. 777"></div>
      <div class="field"><label for="entry-team">Team</label><input id="entry-team" placeholder="Teamname"></div>
      <div class="field"><label for="entry-car">Auto</label><input id="entry-car" placeholder="z. B. Ferrari 296 GT3 EVO"></div>
      <div class="field"><label for="entry-class">Klasse</label><select id="entry-class"><option>PRO</option><option>PRO-AM</option><option>GOLD</option><option>SILVER</option><option>BRONZE</option></select></div>
      <div class="field"><label for="entry-drivers">Fahrer</label><textarea id="entry-drivers" placeholder="Ein Fahrer pro Zeile"></textarea></div>
      <div class="field"><label for="entry-hooks">Aufhänger / Notes</label><textarea id="entry-hooks" placeholder="Ein Punkt pro Zeile"></textarea></div>
    </div>
    <div class="saverow">
      <button class="ghostbtn" id="entry-cancel">Abbrechen</button>
      <button class="savebtn" id="entry-save">Eintrag speichern</button>
    </div>
  </div>
</div>

 /* ===== AKTUELLE THEMEN ===== */
 {cat:"themen",title:"Makowiecki ersetzt Heinrich (#22)",sub:"Fahrerwechsel · Schumacher CLRT Porsche",html:`
   <div class="dsec"><p>Kurzfristiger Fahrerwechsel im <b>Schumacher CLRT Porsche #22</b>: <b>Frédéric Makowiecki</b> ersetzt <b>Laurin Heinrich</b>, der stattdessen bei den 6h Watkins Glen der IMSA startet (dort aktuell WM-Zweiter und bestplatzierter Porsche-Pilot).</p>
   <p>Makowiecki, ehemaliger Porsche-Werksfahrer, teilt sich das Auto mit DTM-Meister <b>Ayhancan Güven</b> und <b>Matt Campbell</b>. 24h Spa und 6h Watkins Glen laufen parallel am letzten Juni-Wochenende.</p>
   <p class="pin">O-Ton-Aufhänger: Routinier ersetzt jungen Werksfahrer — Makowiecki kennt Spa wie seine Westentasche.</p></div>`},
 {cat:"themen",title:"Titel-Trio 2025 auf drei Autos verteilt",sub:"Bortolotti / Pepper / Engstler",html:`
   <div class="dsec"><p>Das siegreiche Trio von 2025 kehrt komplett zurück — aber in <b>drei verschiedenen Autos</b>:</p>
   <ul class="dlist">
   <li><span class="k">#63 Lambo</span><span class="v">Mirko Bortolotti (TGI by GRT)</span></li>
   <li><span class="k">#32 BMW</span><span class="v">Jordan Pepper (Team WRT)</span></li>
   <li><span class="k">#96 Lambo</span><span class="v">Luca Engstler (Rutronik)</span></li>
   </ul>
   <p class="pin">Schöne Erzähllinie: Die drei Sieger jagen sich diesmal gegenseitig.</p></div>`},
 {cat:"themen",title:"Lamborghini Temerario — 24h-Debüt",sub:"Titelverteidiger mit neuem Auto",html:`
   <div class="dsec"><p>Die größte Neuigkeit der Saison: Titelverteidiger <b>Lamborghini</b> bringt den neuen <b>Temerario GT3</b> erstmals bei einem 24-Stunden-Rennen an den Start (#63 & #96). Auch <b>Ferrari, Ford und Porsche</b> schicken verbesserte Fahrzeuge ins Rennen.</p>
   <p class="pin">Zuverlässigkeit über 24h ist beim Neuwagen immer die Schlüsselfrage.</p></div>`},
 {cat:"themen",title:"Hitzewelle in Spa — Strategiethema",sub:"Wetterwarnung des Veranstalters",html:`
   <div class="dsec"><p>Für die Rennwoche sind <b>außergewöhnlich hohe Temperaturen</b> vorhergesagt. Der Veranstalter hat Schutzmaßnahmen ergriffen: kostenlose Trinkwasserstellen rund um die Strecke, schattige Waldbereiche, zusätzliche Festzelte an <b>Les Combes</b> und <b>Double Gauche</b>.</p>
   <p>Sportlich heißt das: höhere Reifen- und Bremsentemperaturen, mehr Degradation, Cockpit-Hitze als Faktor über 24 Stunden, mögliche Auswirkungen auf Stintlängen und Fahrerbelastung.</p>
   <p class="pin">On-Air-Aufhänger: „Hitzeschlacht in den Ardennen" — Material und Mensch am Limit. Kühlung, Trinksysteme und Nachtphase (Abkühlung) werden zur Story.</p></div>`},
 {cat:"themen",title:"Era Motorsport zurückgezogen — Feld auf 69",sub:"#81 Porsche raus",html:`
   <div class="dsec"><p>Der <b>#81 Era Motorsport Porsche</b> (Bronze Cup) wurde kurz vor dem Rennen <b>zurückgezogen</b>. Das Feld schrumpft damit von 70 auf <b>69 Fahrzeuge</b> — weiterhin das weltgrößte GT3-Rennen.</p>
   <p>Bestätigt waren nur Kyle Tilley und Jake Hill; das Chassis stammte von Lionspeed GP. Im Prologue war der Wagen nur sporadisch auf der Strecke.</p>
   <p class="pin">Kurz erwähnen, falls die #81 im Material/auf Listen noch auftaucht — sie startet nicht.</p></div>`},
 {cat:"themen",title:"Monza-Sensation: Audi siegt aus P29",sub:"Tresor Attempto #66 · größter Schock der Serie",html:`
   <div class="dsec"><p>Beim letzten Endurance-Lauf in Monza gewann der <b>#66 Tresor Attempto Audi</b> (Mazzola/Øgaard/Levi) — und das von <b>Startplatz 29</b>. Das ist der Rekord für den am weitesten hinten gestarteten Sieger (jetzt 3×, zweimal in Monza) und der <b>erste Gesamtsieg eines Silver-Cup-Autos</b> in der Endurance-Historie.</p>
   <p>Das Rennen begann mit einem Massencrash in Kurve 1 und endete nach mehreren Full-Course-Yellow-Phasen mit dem Coup. Tresor Attempto fährt in Spa #66 (Silver), #88 und #99.</p>
   <p class="pin">On-Air-Gold: „In Monza ist alles möglich" — und Audi ist wieder ein Sieger.</p></div>`},
 {cat:"themen",title:"Pech-Geschichten aus Monza",sub:"Winward #87 · RJN #23 · relevant für Spa",html:`
   <div class="dsec"><p><b>#87 Winward Mercedes</b> (Salikhov/Piana/Dienst) war das Pechauto: lange in den Top 6, Dienst nur Zentimeter vom Sieg gegen den Audi — dann vom #9 Pure Rxcing Porsche abgeräumt (der selbst vom #32 WRT-BMW getroffen worden war). Sicher geglaubte P2 + Bronze-Sieg = nichts. Beide Autos sind in Spa dabei.</p>
   <p><b>#23 RJN McLaren</b> (Schlussfahrer Ben Dörr) hatte die Siegpace, stoppte unter FCY eine Runde zu früh und verlor den Sieg. Auch in Spa am Start (Silver).</p>
   <p class="pin">Wiedergutmachungs-Erzählungen für Spa: Winward und RJN haben offene Rechnungen.</p></div>`},
 {cat:"side",title:"Boutsen VDS: Fluch & Erlösung",sub:"#10 vs. #2 — Story für Spa",html:`
   <div class="dsec"><p>Der <b>#10 Boutsen VDS Porsche</b> blieb in Monza erneut ohne gefahrene Runde — die <b>vierte Nullnummer in Folge</b>, jedes Mal unverschuldet. Das Schwester-Auto <b>#2</b> (mit Picariello) hat dagegen in Sprint + Endurance <b>jede einzelne Runde</b> beendet (337 insgesamt).</p>
   <p class="pin">Ein Klassensieg in Spa wäre für die #2 die süße Erlösung — schöne Erzähllinie über zwei baugleiche Autos mit gegensätzlichem Saisonverlauf.</p></div>`},
 {cat:"side",title:"Monza: schwarzer Tag für Pro & Gold",sub:"BoP-/Klassen-Kontext",html:`
   <div class="dsec"><p>In Monza standen so wenige Pro-Autos vorn wie nie: nur <b>1 Pro auf dem Podium</b>, 4 in den Top 10, und nur <b>8 von 17</b> Pro-Startern kamen ins Ziel. Auch der Gold Cup hatte einen Tag zum Vergessen (Sieger-Ferrari nur 14. gesamt).</p>
   <p>Dagegen: <b>alle 16 Bronze-Autos</b> klassiert, 13 von 16 Silver. Der #74 Kessel Ferrari erbte spät den Bronze-Sieg.</p>
   <p class="pin">Hintergrund-Aufhänger: Werks-Pros sind in der Langstrecke nicht automatisch vorn — Strategie, BoP und Zuverlässigkeit zählen ebenso.</p></div>`},
 {cat:"side",title:"Neu 2026: „GT World Sneakers“ für die schnellste Runde",sub:"Kleiner On-Air-Sidefact",html:`
   <div class="dsec"><p>Neuer Bonus 2026: Wer in einem Rennen die schnellste Runde fährt, bekommt ein Paar individualisierte <b>GT-World-Sneaker</b>. Bisherige Gewinner: Nicki Thiim, Maro Engel, Morris Schuring und Dennis Marschall (Monza, 1:46.396).</p>
   <p class="pin">Lockerer Faktencheck zwischendurch — kommt beim Publikum gut an.</p></div>`},
 {cat:"side",title:"HRT Ford: erste Mustang-Pole",sub:"Monza-Quali",html:`
   <div class="dsec"><p>In Monza holte der <b>Ford Mustang GT3</b> mit HRT Ford Racing seine <b>erste Pole</b> in der Serie. Ford bringt für Spa ein verbessertes Paket — eines von nur zwei Fords im Feld (#64 Pro, #65 Silver).</p>
   <p class="pin">Underdog-Story: Ford als kleiner, aber zunehmend ernstzunehmender Hersteller.</p></div>`},

 {cat:"reg",title:"Fahrer-Kategorien & Klassen-Zusammensetzung",sub:"Platinum · Gold · Silber · Bronze",html:`
   <div class="dsec"><h3>Die vier FIA-Fahrerstufen</h3>
   <ul class="dlist">
   <li><span class="k" style="color:var(--plat)">Platinum</span><span class="v">Top-Profis: Werksfahrer, Ex-F1/WEC-Asse. Die schnellste Stufe.</span></li>
   <li><span class="k" style="color:var(--gold)">Gold</span><span class="v">Sehr starke Profis, oft erfahrene GT-Piloten.</span></li>
   <li><span class="k" style="color:var(--silver)">Silber</span><span class="v">Schnelle (oft junge) Fahrer ohne Top-Profi-Status.</span></li>
   <li><span class="k" style="color:var(--bronze)">Bronze</span><span class="v">Gentleman-/Amateurfahrer. Pflicht in Bronze Cup & Pro-Am.</span></li>
   </ul></div>
   <div class="dsec"><h3>Erlaubte Aufstellung je Klasse</h3>
   <table class="mini">
   <tr><td><b style="color:var(--pro)">PRO</b></td><td>Beliebige Kategorisierung (faktisch Platinum/Gold). Kein Bronze. <b>Keine 2-Fahrer-Paare erlaubt.</b></td></tr>
   <tr><td><b style="color:var(--goldc)">GOLD CUP</b></td><td>Gold + Gold + Silber</td></tr>
   <tr><td><b style="color:var(--silverc)">SILVER CUP</b></td><td>Silber + Silber + Silber</td></tr>
   <tr><td><b style="color:var(--bronzec)">BRONZE CUP</b></td><td>Platinum + Silber + Bronze (mind. 1 echter Bronze, kein Ex-Profi)</td></tr>
   <tr><td><b style="color:var(--proam)">PRO-AM</b></td><td>Amateur-Stufe mit Profi-Verstärkung (Bronze + Pro-Mix)</td></tr>
   </table>
   <p class="pin">Spa-Besonderheit: erlaubt sind <b>3 ODER 4 Fahrer</b> pro Auto (Endurance sonst meist 3). Die meisten Teams setzen auf 4.</p></div>`},
 {cat:"reg",title:"Punktesystem — Spa zählt dreifach",sub:"100 Punkte für den Sieg",html:`
   <div class="dsec"><h3>Punkte 24h Spa (pro Rennen)</h3>
   <table class="mini">
   <tr><td>1.</td><td>100</td><td>4.</td><td>48</td><td>7.</td><td>24</td></tr>

   <p>Zum Vergleich: Ein normales Endurance-Rennen (3h) bringt dem Sieger 50 Punkte. <b>Spa ist also doppelt so viel wert</b> — der Endurance-Titel entscheidet sich oft hier.</p>
   <p class="pin">Die Zwischenwertungen nach 6h und 12h bringen <b>keine WM-Punkte</b>, aber eigene Trophäen.</p></div>`},
 {cat:"reg",title:"Coupe du Roi (King's Cup)",sub:"Spa-Sonderwertung",html:`
   <div class="dsec"><p>Traditionelle Spa-Sonderwertung: Die <b>Coupe du Roi</b> (King's Cup) prämiert das beste Gesamtergebnis je Hersteller/Team über die kombinierten Resultate — eine reine Spa-Ehrung mit langer Historie.</p>

 {cat:"reg",title:"Pflicht-Stints, Fahrzeiten & Boxenstopps",sub:"Wie ein 24h-Rennen funktioniert",html:`
   <div class="dsec"><h3>Maximale Stint-Zeit (MDS)</h3>
   <p>Pro Event gibt es eine maximale Stintzeit (MDS) plus eine verlängerte Stintzeit (EDS), die greift, wenn während des Stints Safety Car oder Full Course Yellow lief. Der exakte Wert kommt per Stewards-Bulletin.</p></div>
   <div class="dsec"><h3>Fahrerwechsel-Regeln</h3>
   <ul class="dlist">
   <li><span class="k">Bronze Cup</span><span class="v">Bei Plat/Bronze- oder Gold/Bronze-Duos: Pro-Fahrer max. MDS − 5 Min. pro Stint.</span></li>
   <li><span class="k">Silber/Bronze</span><span class="v">Bronze muss eine Mindest-Stintzeit (MDS − 5 Min.) fahren.</span></li>
   <li><span class="k">Wechsel</span><span class="v">Reihenfolge nach Admin-Checks fix; Änderung nur mit Steward-OK (Force Majeure).</span></li>
   </ul>
   <p class="pin">Für On-Air: Wenn ein Bronze ungewöhnlich kurz/lang fährt, lohnt der Blick auf die Stint-Regel.</p></div>`},

/* ===== STATE ===== */
let activeCat="teams", activeCls="ALLE", query="";
const CATS=[
 {id:"teams",label:"Teams",icon:"🏁"},
 {id:"themen",label:"Aktuelle Themen",icon:"🔥"},
 {id:"reg",label:"Reglement",icon:"📋"},
 {id:"zeit",label:"Zeitplan",icon:"⏱"},
 {id:"erg",label:"Ergebnisse",icon:"📊"},
 {id:"side",label:"Sidefacts",icon:"💡"}
];
const CLASSES=["ALLE","PRO","PRO-AM","GOLD","SILVER","BRONZE"];
const CUSTOM_STORAGE_KEY="spa24_custom_entries_v1";
let customTeams=loadCustomTeams();

const $=id=>document.getElementById(id);
const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const allTeams=()=>[...TEAMS,...customTeams];

function loadCustomTeams(){
  try{
    const raw=localStorage.getItem(CUSTOM_STORAGE_KEY);
    const parsed=raw?JSON.parse(raw):[];
    return Array.isArray(parsed)?parsed:[];
  }catch(_){ return []; }
}
function persistCustomTeams(){
  localStorage.setItem(CUSTOM_STORAGE_KEY,JSON.stringify(customTeams));
}
function splitLines(v){
  return String(v||"").split("\n").map(s=>s.trim()).filter(Boolean);
}
function openEntrySheet(){
  $("entry-sheet").classList.add("on");
}
function closeEntrySheet(){
  $("entry-sheet").classList.remove("on");
}
function resetEntryForm(){
  $("entry-number").value="";
  $("entry-team").value="";
  $("entry-car").value="";
  $("entry-class").value="PRO";
  $("entry-drivers").value="";
  $("entry-hooks").value="";
}
function saveEntry(){
  const n=$("entry-number").value.trim();
  const team=$("entry-team").value.trim();
  const car=$("entry-car").value.trim();
  const cls=$("entry-class").value.trim();
  const d=splitLines($("entry-drivers").value);
  const hooks=splitLines($("entry-hooks").value);
  if(!n||!team||!car){
    alert("Bitte mindestens Startnummer, Team und Auto ausfüllen.");
    return;
  }
  if(allTeams().some(t=>t.n===n)){
    alert("Die Startnummer existiert bereits.");
    return;
  }
  customTeams.unshift({n,team,car,cls,d,hooks,isCustom:true});
  persistCustomTeams();
  resetEntryForm();
  closeEntrySheet();
  activeCat="teams";
  renderAll();
}
function deleteCustomEntry(num){
  const idx=customTeams.findIndex(t=>t.n===num);
  if(idx<0) return;
  customTeams.splice(idx,1);
  persistCustomTeams();
  $("detail").classList.remove("on");
  renderList();
}

function renderPills(){
  $("pills").innerHTML=CATS.map(c=>`<button class="pill ${c.id===activeCat?'on':''}" data-cat="${c.id}"><span>${c.icon}</span>${c.label}</button>`).join("");
  document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{activeCat=b.dataset.cat;activeCls="ALLE";renderAll()});
}
function renderChips(){
  const wrap=$("chips");
  if(activeCat!=="teams"){wrap.style.display="none";return}
  wrap.style.display="flex";
  wrap.innerHTML=CLASSES.map(c=>`<button class="chip ${c===activeCls?'on':''}" data-c="${c}">${c}</button>`).join("");
  document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{activeCls=b.dataset.c;renderList()});
}

function teamMatches(t){
  if(activeCls!=="ALLE" && t.cls!==activeCls) return false;
  if(!query) return true;
  const hay=norm([t.n,t.team,t.car,MAN[t.car],t.cls,(t.d||[]).join(" "),(t.hooks||[]).join(" ")].join(" "));
  return query.split(/\s+/).every(w=>hay.includes(w));
}
function infoMatches(it){
  if(it.cat!==activeCat) return false;
  if(!query) return true;
  const hay=norm([it.title,it.sub,it.html].join(" "));
  return query.split(/\s+/).every(w=>hay.includes(w));
}

function renderList(){
  const list=$("list"); let html=""; let n=0;
  if(activeCat==="teams"){
    const order=["PRO","PRO-AM","GOLD","SILVER","BRONZE"];
    const shown=allTeams().filter(teamMatches);
    n=shown.length;
    const groups=activeCls==="ALLE"?order:[activeCls];
    groups.forEach(cl=>{
      const g=shown.filter(t=>t.cls===cl);
      if(!g.length) return;
      html+=`<div class="seclabel">${cl} · ${g.length}</div>`;
      g.forEach(t=>{
        const cc=t.cls.replace("-","");
        const drv=(t.d||[]).filter(x=>x&&x!=="TBA");
        html+=`<div class="card" data-team="${t.n}"><div class="crow">
          <div class="num">${t.n}</div>
          <div class="cmain">
            <div class="cteam">${t.team}</div>
            <div class="ccar">${MAN[t.car]||""} · ${t.car}</div>
            <div class="drow">${drv.map(d=>`<b>${d.split(' ').pop()}</b>`).join(" · ")}</div>
            ${(t.hooks&&t.hooks.length)?`<div class="hooks">${t.hooks.slice(0,3).map(h=>`<span class="hook${t.isCustom?' custom':''}">${h}</span>`).join("")}</div>`:""}
            ${t.isCustom?`<div class="customflag">Eigener Eintrag</div>`:""}
          </div>
          <div class="ctag"><span class="clsbadge ${cc}">${t.cls}</span></div>
        </div></div>`;
      });
    });
  } else {
    const shown=INFO.filter(infoMatches);
    n=shown.length;
    shown.forEach((it,i)=>{
      const idx=INFO.indexOf(it);
      html+=`<div class="card" data-info="${idx}"><div class="crow">
        <div class="cmain"><div class="cteam">${it.title}</div><div class="ccar">${it.sub||""}</div></div>
        <div class="ctag"><span class="clsbadge INFO">›</span></div>
      </div></div>`;
    });
  }
  list.innerHTML = html || `<div class="empty">Keine Treffer.<br>Filter oder Suche anpassen.</div>`;
  $("count").textContent = n+(activeCat==="teams"?" Autos":" Einträge");
  document.querySelectorAll('[data-team]').forEach(c=>c.onclick=()=>showTeam(c.dataset.team));
  document.querySelectorAll('[data-info]').forEach(c=>c.onclick=()=>showInfo(c.dataset.info));
}

function showTeam(num){
  const t=allTeams().find(x=>x.n===num); if(!t) return;
  const cc=t.cls.replace("-","");
  const drv=(t.d||[]);
  const body=`
    <div class="dnum"><span class="n">${t.n}</span><span class="clsbadge ${cc}" style="font-size:12px;padding:5px 10px">${t.cls}</span></div>
    <div class="dtitle">${t.team}</div>
    <div class="dsub">${MAN[t.car]||""} · ${t.car}</div>
    ${t.isCustom?`<div class="customflag">Eigener Eintrag</div>`:""}
    <div class="dsec"><h3>Fahrer</h3><div class="drivers">
    ${drv.map((d,i)=>`<div class="driver"><span class="di">${i+1}</span><span class="dn">${d==="TBA"?'<span style="color:var(--dim)">noch offen (TBA)</span>':d}</span></div>`).join("")}
    </div></div>
    ${(t.hooks&&t.hooks.length)?`<div class="dsec"><h3>Aufhänger / On-Air</h3><div class="hooks">${t.hooks.map(h=>`<span class="hook">${h}</span>`).join("")}</div></div>`:""}
    <div class="pin">Klassen-Vorgabe ${t.cls}: ${clsRule(t.cls)}</div>
    ${t.isCustom?`<button class="mutebtn" onclick="deleteCustomEntry('${t.n}')">Eintrag löschen</button>`:""}`;
  openDetail(body);
}
function clsRule(c){
  return {
   "PRO":"beliebige Kategorisierung (Platinum/Gold), kein Bronze.",
   "PRO-AM":"Amateur-Stufe mit Profi-Verstärkung (Bronze + Pro-Mix).",
   "GOLD":"Gold + Gold + Silber.",
   "SILVER":"drei Silber-Fahrer.",
   "BRONZE":"Platinum + Silber + Bronze (mind. 1 echter Bronze)."
  }[c]||"";
}
function showInfo(idx){ const it=INFO[+idx]; if(!it) return;
  openDetail(`<div class="dtitle">${it.title}</div><div class="dsub">${it.sub||""}</div>${it.html}`);
}
function openDetail(html){ $("dbody").innerHTML=html+`<div class="foot">24h Spa 2026 · Stand 11.06.2026</div>`; $("detail").classList.add("on"); $("dbody").scrollTop=0; }
$("back").onclick=()=>$("detail").classList.remove("on");
window.deleteCustomEntry=deleteCustomEntry;
$("add-entry-btn").onclick=()=>openEntrySheet();
$("entry-close").onclick=()=>(closeEntrySheet());
$("entry-cancel").onclick=()=>(closeEntrySheet());
$("entry-save").onclick=saveEntry;
$("entry-sheet").addEventListener("click",e=>{ if(e.target.id==="entry-sheet") closeEntrySheet(); });

function renderAll(){ renderPills(); renderChips(); renderList(); }
$("q").addEventListener("input",e=>{query=norm(e.target.value.trim());renderList()});
renderAll();
</script>
</body>
</html>
