name = "gtwc-timing"
main = "worker/index.js"
account_id = "26ef6c9066ca3d71dfd4bed75c5450dd"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "TIMING_STATE"
class_name = "TimingState"

[[migrations]]
tag = "v1"
new_classes = ["TimingState"]

[vars]
SRO_FTP_HOST = "xml-motorsport.sportresult.com"
SRO_FTP_PORT = "21"
SRO_FTP_USER = "racing-sro"
SRO_FTP_ROOT = "SRO"
SRO_SERIES_PRIORITY = "GTWorldCh,GT4"
# SRO_FTP_PASS is set via: wrangler secret put SRO_FTP_PASS
# INGEST_SECRET is set via: wrangler secret put INGEST_SECRET
